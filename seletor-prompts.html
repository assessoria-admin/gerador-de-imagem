  <style>
    @font-face {
      font-family: 'Neue Machina';
      src: url('/fonts/NeueMachina-Light.otf') format('opentype');
      font-weight: 300; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Machina';
      src: url('/fonts/NeueMachina-Regular.otf') format('opentype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Neue Machina';
      src: url('/fonts/NeueMachina-Ultrabold.otf') format('opentype');
      font-weight: 800; font-style: normal; font-display: swap;
    }

    :root {
      --teal:   #41c1c2;
      --bg:     #080808;
      --card:   #0f0f0f;
      --border: #1c1c1c;
      --muted:  #555;
      --font:   'Neue Machina', 'Helvetica Neue', Arial, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: var(--font);
      min-height: 100vh;
      padding: 96px 20px 80px;
    }

    .wrap { max-width: 960px; margin: 0 auto; }

    /* ─── Header ────────────────────────────────────────────────── */
    header { text-align: center; margin-bottom: 44px; }
    .header-rule {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin-bottom: 10px;
    }
    .header-rule span {
      flex: 1; height: 1px; max-width: 60px;
      background: linear-gradient(to right, transparent, var(--teal));
    }
    .header-rule span:last-child {
      background: linear-gradient(to left, transparent, var(--teal));
    }
    h1 { font-size: 20px; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; }
    header p { font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-top: 6px; }
    .back-link {
      display: inline-block; margin-bottom: 28px;
      font-size: 11px; color: var(--muted); letter-spacing: 1px;
      text-decoration: none; transition: color .2s;
    }
    .back-link:hover { color: var(--teal); }

    /* ─── Card ──────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }

    /* ─── Form fields ───────────────────────────────────────────── */
    .field { margin-bottom: 22px; }

    label {
      display: block;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 9px;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 15px;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    input[type="text"]:focus {
      border-color: rgba(65,193,194,.45);
      background: rgba(65,193,194,.03);
    }
    input[type="text"]::placeholder { color: #2a2a2a; }

    /* ─── Autocomplete ──────────────────────────────────────────── */
    .ac-wrap { position: relative; }
    .ac-dropdown {
      position: absolute; top: calc(100% + 2px); left: 0; right: 0;
      z-index: 200; background: #141414;
      border: 1px solid rgba(65,193,194,.25);
      border-radius: 8px; overflow: hidden;
      display: none; box-shadow: 0 8px 24px rgba(0,0,0,.6);
    }
    .ac-dropdown.open { display: block; }
    .ac-item {
      padding: 11px 15px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background .15s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover { background: rgba(65,193,194,.08); }
    .ac-item-name { font-size: 14px; color: #fff; }
    .ac-item-role { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .ac-empty { padding: 13px 15px; font-size: 12px; color: var(--muted); text-align: center; letter-spacing: .5px; }
    .ac-loading { padding: 13px 15px; font-size: 12px; color: var(--teal); display: flex; align-items: center; gap: 8px; }
    .ac-spin {
      width: 12px; height: 12px;
      border: 2px solid rgba(65,193,194,.2);
      border-top-color: var(--teal); border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }

    /* ─── Photo loaded indicator ────────────────────────────────── */
    .photo-loaded {
      display: none; align-items: center; gap: 10px; margin-top: 10px;
      background: rgba(65,193,194,.04);
      border: 1px solid rgba(65,193,194,.18);
      border-radius: 8px; padding: 10px 14px;
    }
    .photo-loaded.visible { display: flex; }
    .photo-loaded-thumb {
      width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--teal); flex-shrink: 0;
    }
    .photo-loaded-label { font-size: 11px; color: var(--teal); letter-spacing: 1px; flex: 1; }
    .photo-loaded-clear {
      background: none; border: none; color: #444; font-size: 16px;
      cursor: pointer; line-height: 1; padding: 0 2px;
      transition: color .2s; flex-shrink: 0;
    }
    .photo-loaded-clear:hover { color: #ff6b6b; }

    /* ─── Upload zone ───────────────────────────────────────────── */
    .upload-zone {
      position: relative; border: 1px dashed var(--border);
      border-radius: 8px; padding: 20px 16px; text-align: center;
      cursor: pointer; transition: border-color .2s, background .2s; overflow: hidden;
    }
    .upload-zone:hover { border-color: rgba(65,193,194,.4); background: rgba(65,193,194,.03); }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-idle { pointer-events: none; }
    .upload-idle .arrow { font-size: 24px; line-height: 1; color: var(--teal); margin-bottom: 6px; }
    .upload-idle p { font-size: 12px; color: var(--muted); }
    .upload-idle strong { color: var(--teal); }

    /* ─── Prompt Grid ───────────────────────────────────────────── */
    .prompt-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    }
    .prompt-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .prompt-card {
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .15s;
      background: rgba(255,255,255,.02);
    }
    .prompt-card:hover { border-color: rgba(65,193,194,.35); transform: translateY(-2px); }
    .prompt-card.selected {
      border-color: var(--teal);
      background: rgba(65,193,194,.06);
      box-shadow: 0 0 0 1px rgba(65,193,194,.3), 0 4px 20px rgba(65,193,194,.12);
    }
    .prompt-preview-img {
      width: 100%; aspect-ratio: 1/1;
      object-fit: cover; display: block;
      background: #111;
    }
    .prompt-preview-placeholder {
      width: 100%; aspect-ratio: 1/1;
      background: linear-gradient(135deg, #161616, #111);
      display: flex; align-items: center; justify-content: center;
    }
    .prompt-preview-placeholder svg { opacity: .15; }
    .prompt-info {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
    }
    .prompt-name {
      font-size: 10px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; color: #aaa;
      transition: color .2s;
    }
    .prompt-card.selected .prompt-name { color: var(--teal); }
    .prompt-check {
      width: 16px; height: 16px; border-radius: 50%;
      border: 1.5px solid #333;
      transition: border-color .2s, background .2s;
      flex-shrink: 0;
    }
    .prompt-card.selected .prompt-check {
      border-color: var(--teal);
      background: var(--teal);
      box-shadow: 0 0 0 2px rgba(65,193,194,.2);
    }

    /* ─── Generate button ───────────────────────────────────────── */
    .btn-generate {
      width: 100%;
      background: var(--teal); color: #000; border: none;
      border-radius: 8px; padding: 15px; font-family: var(--font);
      font-size: 11px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer; transition: opacity .2s, transform .1s;
    }
    .btn-generate:hover:not(:disabled) { opacity: .88; }
    .btn-generate:active:not(:disabled) { transform: scale(.99); }
    .btn-generate:disabled { opacity: .28; cursor: not-allowed; }

    /* ─── Status bar ────────────────────────────────────────────── */
    .status-bar { display: flex; align-items: center; gap: 10px; min-height: 28px; margin-top: 18px; }
    .spinner {
      display: none; flex-shrink: 0; width: 15px; height: 15px;
      border: 2px solid rgba(65,193,194,.2); border-top-color: var(--teal);
      border-radius: 50%; animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-msg { font-size: 12px; color: var(--teal); letter-spacing: .5px; }
    .status-msg.err { color: #ff6b6b; }

    /* ─── Result section ────────────────────────────────────────── */
    .result { display: none; margin-top: 32px; }
    .divider { height: 1px; background: var(--border); margin-bottom: 24px; }
    .result-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
    }
    #canvas { display: block; width: 100%; border-radius: 12px; border: 1px solid var(--border); }
    .btn-download {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin-top: 14px; background: transparent;
      border: 1px solid var(--teal); color: var(--teal); border-radius: 8px; padding: 13px;
      font-family: var(--font); font-size: 11px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .btn-download:hover { background: var(--teal); color: #000; }

    /* ─── Tool Nav ──────────────────────────────────────────────── */
    .tool-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
      background: rgba(8,8,8,.88); backdrop-filter: blur(10px);
      border-bottom: 1px solid #1c1c1c;
      padding: 10px 16px;
    }
    .tool-nav a {
      font-family: 'Neue Machina', sans-serif;
      font-size: 11px; font-weight: 800; letter-spacing: 2.5px;
      text-transform: uppercase; text-decoration: none;
      color: #555; padding: 7px 18px; border-radius: 8px;
      border: 1px solid transparent;
      transition: color .2s, border-color .2s, background .2s;
    }
    .tool-nav a:hover { color: #fff; }
    .tool-nav a.active {
      color: #41c1c2; border-color: rgba(65,193,194,.35);
      background: rgba(65,193,194,.07);
    }

    @media (max-width: 700px) {
      .prompt-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 420px) {
      .prompt-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

/* ════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════ */
let notionPhotoDataUrl = null;
let selectedPromptIndex = null;

/* ════════════════════════════════════════════════════════════════
   BUILD PROMPT GRID
════════════════════════════════════════════════════════════════ */
const grid = document.getElementById('promptGrid');

PROMPTS.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'prompt-card';
  card.dataset.index = i;

  const imgSrc = `/assets/prompt-previews/prompt-${i + 1}.png`;
  card.innerHTML = `
    <img class="prompt-preview-img" src="${imgSrc}" alt="${p.label}"
      onerror="this.outerHTML='<div class=\\'prompt-preview-placeholder\\'><svg width=\\'40\\' height=\\'40\\' viewBox=\\'0 0 40 40\\' fill=\\'none\\'><circle cx=\\'20\\' cy=\\'14\\' r=\\'9\\' stroke=\\'white\\' stroke-width=\\'1.5\\'/><path d=\\'M4 36 C4 26 36 26 36 36\\' stroke=\\'white\\' stroke-width=\\'1.5\\' fill=\\'none\\'/></svg></div>'" />
    <div class="prompt-info">
      <span class="prompt-name">${p.label}</span>
      <div class="prompt-check"></div>
    </div>
  `;

  card.addEventListener('click', () => {
    document.querySelectorAll('.prompt-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedPromptIndex = i;
    checkReady();
  });

  grid.appendChild(card);
});

/* ════════════════════════════════════════════════════════════════
   NOTION AUTOCOMPLETE
════════════════════════════════════════════════════════════════ */
let acTimer = null;
const searchInput = document.getElementById('searchInput');
const acDropdown  = document.getElementById('acDropdown');
const acWrap      = document.getElementById('acWrap');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearTimeout(acTimer);
  if (q.length < 2) { acClose(); return; }
  acDropdown.innerHTML = '<div class="ac-loading"><div class="ac-spin"></div>Buscando…</div>';
  acDropdown.classList.add('open');
  acTimer = setTimeout(() => notionSearch(q), 350);
});

document.addEventListener('click', e => {
  if (!acWrap.contains(e.target)) acClose();
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') acClose();
});

async function notionSearch(q) {
  try {
    const res  = await fetch(`/api/notion/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    acRender(data.results || []);
  } catch {
    acDropdown.innerHTML = '<div class="ac-empty">Erro ao buscar no Notion</div>';
  }
}

function acRender(results) {
  if (results.length === 0) {
    acDropdown.innerHTML = '<div class="ac-empty">Nenhum resultado encontrado</div>';
    acDropdown.classList.add('open');
    return;
  }
  acDropdown.innerHTML = '';
  results.forEach(person => {
    const el = document.createElement('div');
    el.className = 'ac-item';
    el.innerHTML = `
      <div class="ac-item-name">${esc(person.name)}</div>
      ${person.cargo ? `<div class="ac-item-role">${esc(person.cargo)}</div>` : ''}
    `;
    el.addEventListener('mousedown', e => { e.preventDefault(); acSelect(person); });
    acDropdown.appendChild(el);
  });
  acDropdown.classList.add('open');
}

function acSelect(person) {
  searchInput.value = person.name || '';
  acClose();
  if (person.photoUrl) loadNotionPhoto(person.photoUrl);
}

function acClose() { acDropdown.classList.remove('open'); }

function esc(str) {
  return (str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ════════════════════════════════════════════════════════════════
   LOAD NOTION PHOTO
════════════════════════════════════════════════════════════════ */
async function loadNotionPhoto(url) {
  try {
    setStatus('Carregando foto do Notion…');
    const proxied = `/api/proxy-image?url=${encodeURIComponent(url)}`;
    const res     = await fetch(proxied);
    const blob    = await res.blob();
    const dataUrl = await new Promise(resolve => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.readAsDataURL(blob);
    });
    setPhoto(dataUrl, 'Foto carregada do Notion ✓');
  } catch {
    setStatus('Não foi possível carregar a foto do Notion.', true);
  }
}

/* ════════════════════════════════════════════════════════════════
   UPLOAD MANUAL
════════════════════════════════════════════════════════════════ */
document.getElementById('photoFile').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => setPhoto(e.target.result, `${file.name}`);
  reader.readAsDataURL(file);
});

function setPhoto(dataUrl, label) {
  notionPhotoDataUrl = dataUrl;
  document.getElementById('photoThumb').src = dataUrl;
  document.getElementById('photoLabel').textContent = label;
  document.getElementById('photoLoaded').classList.add('visible');
  document.getElementById('uploadZone').style.display = 'none';
  setStatus('Foto carregada ✓');
  setTimeout(() => setStatus(''), 2000);
  checkReady();
}

document.getElementById('photoClear').addEventListener('click', () => {
  notionPhotoDataUrl = null;
  document.getElementById('photoThumb').src = '';
  document.getElementById('photoLoaded').classList.remove('visible');
  document.getElementById('uploadZone').style.display = '';
  document.getElementById('photoFile').value = '';
  searchInput.value = '';
  checkReady();
});

/* ════════════════════════════════════════════════════════════════
   READY CHECK
════════════════════════════════════════════════════════════════ */
function checkReady() {
  const ready = notionPhotoDataUrl !== null && selectedPromptIndex !== null;
  document.getElementById('btnGenerate').disabled = !ready;
}

/* ════════════════════════════════════════════════════════════════
   GENERATE
════════════════════════════════════════════════════════════════ */
document.getElementById('btnGenerate').addEventListener('click', generate);

async function generate() {
  if (!notionPhotoDataUrl || selectedPromptIndex === null) return;

  setLoading(true);
  document.getElementById('result').style.display = 'none';

  try {
    setStatus('Preparando foto de referência…');
    const dataUrl   = await resizeDataUrl(notionPhotoDataUrl, 1024, 0.82);
    const base64Img = dataUrl.split(',')[1];

    setStatus('Enviando para Gemini…');
    const prompt = PROMPTS[selectedPromptIndex].text;
    const genResult = await startGeneration(base64Img, prompt);

    let imageSrc;
    if (genResult.type === 'immediate') {
      imageSrc = genResult.data;
    } else {
      setStatus('Gerando imagem com IA… (pode levar ~30s)');
      imageSrc = await pollGeneration(genResult.taskId);
    }

    setStatus('Removendo fundo com Remove.bg…');
    const finalSrc = await removeBackground(imageSrc);

    setStatus('Renderizando resultado…');
    await renderCanvas(finalSrc);

    setStatus('');
    setLoading(false);
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    console.error(err);
    setStatus('Erro: ' + err.message, true);
    setLoading(false);
  }
}

/* ════════════════════════════════════════════════════════════════
   GEMINI API
════════════════════════════════════════════════════════════════ */
async function startGeneration(base64Image, prompt) {
  const body = {
    prompt,
    reference_images: [{ image: base64Image, mime_type: 'image/jpeg' }]
  };
  const res  = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body:   JSON.stringify(body)
  });
  const json = await res.json().catch(() => null);
  if (!res.ok) {
    throw new Error(`Gemini API (${res.status}): ${json?.message || res.statusText}`);
  }
  const generated = json?.data?.generated;
  if (Array.isArray(generated) && generated.length > 0) return { type: 'immediate', data: generated[0] };
  throw new Error('Resposta inesperada da API Gemini — veja o console.');
}

/* ════════════════════════════════════════════════════════════════
   REMOVE.BG
════════════════════════════════════════════════════════════════ */
async function removeBackground(imageSrc) {
  const body = imageSrc.startsWith('http')
    ? { imageUrl: imageSrc }
    : { imageBase64: imageSrc };

  const res  = await fetch('/api/removebg', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(body)
  });
  const json = await res.json().catch(() => null);
  if (!res.ok) throw new Error(`Remove.bg: ${json?.message || res.statusText}`);
  return json.base64;
}

/* ════════════════════════════════════════════════════════════════
   CANVAS — raw drawImage, no text overlay
════════════════════════════════════════════════════════════════ */
async function renderCanvas(src) {
  const img    = await loadImage(src);
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const W = img.naturalWidth  || img.width  || 640;
  const H = img.naturalHeight || img.height || 800;
  canvas.width  = W;
  canvas.height = H;
  ctx.drawImage(img, 0, 0, W, H);
}

/* ════════════════════════════════════════════════════════════════
   DOWNLOAD
════════════════════════════════════════════════════════════════ */
document.getElementById('btnDownload').addEventListener('click', () => {
  const canvas = document.getElementById('canvas');
  try {
    const a = document.createElement('a');
    a.download = `seletor-estilo${selectedPromptIndex + 1}.png`;
    a.href     = canvas.toDataURL('image/png');
    a.click();
  } catch {
    setStatus('Download bloqueado por CORS. Clique com botão direito → Salvar imagem.', true);
  }
});

/* ════════════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════════════ */
function resizeDataUrl(dataUrl, maxSide = 1024, quality = 0.82) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxSide / img.width, maxSide / img.height, 1);
      const w = Math.round(img.width  * ratio);
      const h = Math.round(img.height * ratio);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img   = new Image();
    const final = src.startsWith('http')
      ? `/api/proxy-image?url=${encodeURIComponent(src)}`
      : src;
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Não foi possível carregar a imagem gerada.'));
    img.src     = final;
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setStatus(msg, isError = false) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className   = 'status-msg' + (isError ? ' err' : '');
}

function setLoading(on) {
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btnGenerate').disabled  = on;
}
</script>
