<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rede Líderes — Ferramentas de Imagem</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    if (!sessionStorage.getItem('unlocked')) {
      window.location.replace('/');
    }
  </script>

  <style>
    @font-face {
      font-family: 'Neue Machina';
      src: url('/fonts/NeueMachina-Ultrabold.otf') format('opentype');
      font-weight: 800; font-style: normal; font-display: swap;
    }

    :root {
      --teal:   #41c1c2;
      --bg:     #080808;
      --card:   #0f0f0f;
      --border: #1c1c1c;
      --muted:  #555;
      --font:   'Neue Machina', 'Helvetica Neue', Arial, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg); color: #fff;
      font-family: var(--font); min-height: 100vh;
      padding: 48px 20px 80px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    header { text-align: center; margin-bottom: 56px; }
    .header-rule {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin-bottom: 10px;
    }
    .header-rule span {
      flex: 1; height: 1px; max-width: 60px;
      background: linear-gradient(to right, transparent, var(--teal));
    }
    .header-rule span:last-child {
      background: linear-gradient(to left, transparent, var(--teal));
    }
    h1 { font-size: 20px; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; }
    header p { font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-top: 6px; }

    .tools { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

    .tool-card {
      display: flex; flex-direction: column;
      width: 260px; padding: 28px 24px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; text-decoration: none; color: #fff;
      transition: border-color .2s, background .2s;
    }
    .tool-card:hover { border-color: rgba(65,193,194,.45); background: rgba(65,193,194,.04); }

    .tool-icon { font-size: 28px; margin-bottom: 16px; }
    .tool-title {
      font-size: 13px; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; color: var(--teal); margin-bottom: 8px;
    }
    .tool-desc { font-size: 12px; color: var(--muted); line-height: 1.6; letter-spacing: .3px; }
  </style>
</head>
<body>

  <header>
    <div class="header-rule">
      <span></span>
      <h1>Rede&nbsp;Líderes</h1>
      <span></span>
    </div>
    <p>Ferramentas de imagem para a comunidade</p>
  </header>

  <div class="tools">
    <a class="tool-card" href="/minibio.html">
      <div class="tool-icon">✨</div>
      <div class="tool-title">Mini Bio</div>
      <div class="tool-desc">Gera foto com fundo IA e overlay com nome, cargo e empresas.</div>
    </a>
    <a class="tool-card" href="/mudanca-cargo.html">
      <div class="tool-icon">🏆</div>
      <div class="tool-title">Mudança de Cargo</div>
      <div class="tool-desc">Card de nova posição + copy para LinkedIn com geração de foto IA.</div>
    </a>
  </div>

</body>
</html>
